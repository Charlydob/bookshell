<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Bookshell</title>
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#05060a" />
  <meta name="bookshell-published-commit" content="3560924" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bookshell" />
  <script>
    (function () {
      var defaultTheme = "dark-opal";
      var validThemes = {
        "dark-opal": true,
        "light-clean": true,
        "midnight-blue": true,
        "forest": true,
        "sand": true
      };
      var nextTheme = defaultTheme;

      try {
        var storedTheme = String(window.localStorage.getItem("bookshell:theme:v1") || "").trim();
        if (validThemes[storedTheme]) {
          nextTheme = storedTheme;
        }
      } catch (e) {}

      document.documentElement.dataset.theme = nextTheme;
    })();
  </script>
  <link href="./styles/core/themes.css" rel="stylesheet" />
  <link href="./styles/core/shell.css" rel="stylesheet" />
  <link href="./styles/modules/books.css" rel="preload" as="style" fetchpriority="high" />
  <link href="./manifest.webmanifest" rel="manifest" />
  <link href="./icons/favicon-32.png" rel="icon" sizes="32x32" type="image/png" />
  <link href="./icons/favicon-16.png" rel="icon" sizes="16x16" type="image/png" />
  <link href="./icons/icon-512.png" rel="apple-touch-icon" sizes="180x180" />

  <style>
    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden !important;
    }

    body {
      overflow-y: auto !important;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: auto;
      touch-action: manipulation;
    }

    .view {
      position: relative;
      width: min(480px, 100%);
      margin: 0 auto;
      padding:
        calc(8px + env(safe-area-inset-top, 0px))
        10px
        calc(6px + var(--nav-total-h) + var(--nav-gap, 20px) + env(safe-area-inset-bottom, 0px));
      overflow: visible;
      display: none !important;
    }

    .view.view-active {
      display: block !important;
      min-height: calc(var(--app-dvh, 100vh) - 24px);
    }

    .view.view-active:empty::before {
      content: "";
      display: block;
      min-height: min(52vh, 420px);
      border-radius: 24px;
      border: 1px solid var(--app-border);
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--app-text) 6%, transparent), transparent 44%),
        var(--app-panel-gradient);
    }

  </style> 

  <script>
    (function () {
      var isStandalone = false;
      try {
        isStandalone = !!(window.matchMedia && window.matchMedia("(display-mode: standalone)").matches);
      } catch (e) {}
      var isIOSStandalone = !!window.navigator.standalone;
      if (isStandalone || isIOSStandalone) {
        document.documentElement.classList.add("is-standalone");
      }
    })();
  </script>

  <style id="boot-splash-style">
    body.boot-loading { overflow: hidden; background: var(--app-bg); }
    #boot-splash {
      position: fixed; inset: 0; z-index: 1000000;
      display: grid; place-items: center;
      padding: max(env(safe-area-inset-top), 20px) 20px max(env(safe-area-inset-bottom), 20px);
      background:
        radial-gradient(1200px 600px at 50% -20%, color-mix(in srgb, var(--app-info) 22%, transparent), transparent 68%),
        var(--app-bg-gradient);
      color: var(--app-text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      transition: opacity .28s ease, visibility .28s ease;
    }
    #boot-splash.boot-splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .boot-splash-card { width: min(360px, 92vw); display: grid; gap: 12px; }
    .boot-splash-title { font-size: 17px; font-weight: 700; letter-spacing: .01em; }
    .boot-splash-status { font-size: 13px; color: var(--app-text-secondary); opacity: .92; min-height: 1.4em; }
    .boot-splash-progress { height: 4px; border-radius: 999px; background: var(--app-progress-bg); overflow: hidden; }
    .boot-splash-progress > i { display: block; height: 100%; width: 20%; border-radius: inherit; background: var(--app-progress-fill); transform-origin: 0 50%; transform: scaleX(.08); transition: transform .32s ease; }
    .boot-splash-note { font-size: 12px; color: var(--app-date-text); opacity: 0; transition: opacity .2s ease; min-height: 1.3em; }
    #boot-splash[data-slow='1'] .boot-splash-note { opacity: .95; }
    .boot-debug-panel {
      border: 1px solid var(--app-border);
      background: color-mix(in srgb, var(--app-panel-bg) 82%, #000 18%);
      border-radius: 12px;
      padding: 10px;
      display: grid;
      gap: 6px;
      max-height: 220px;
      overflow: auto;
      font-size: 11px;
    }
    .boot-debug-title { font-weight: 700; font-size: 12px; }
    .boot-debug-line { white-space: pre-wrap; word-break: break-word; line-height: 1.35; }
    .boot-debug-line[data-level="error"] { color: #ffb4b4; }
    .boot-debug-line[data-level="warn"] { color: #ffe08f; }
    .boot-debug-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .boot-debug-actions button {
      font: inherit; border-radius: 8px; border: 1px solid var(--app-border);
      background: transparent; color: var(--app-text); padding: 6px 8px; cursor: pointer;
    }
  </style>

  <script>
    (function () {
      var splash, statusEl, progressEl, debugLogEl, bootDebugStatusEl;
      var value = 0;
      var timer = null;
      var done = false;
      var events = [];
      var pendingEvents = [];
      var lastTechnicalError = null;
      var startedAt = Date.now();
      var watchdogSlowTimer = null;
      var watchdogFailTimer = null;
      var phases = [
        { at: 0, text: 'Inicializando…' },
        { at: 24, text: 'Conectando…' },
        { at: 52, text: 'Cargando datos…' },
        { at: 76, text: 'Preparando interfaz…' }
      ];

      function ensure() {
        if (splash) return true;
        splash = document.getElementById('boot-splash');
        if (!splash) return false;
        statusEl = splash.querySelector('[data-role="status"]');
        progressEl = splash.querySelector('[data-role="bar"]');
        debugLogEl = splash.querySelector('[data-role="boot-debug-log"]');
        bootDebugStatusEl = splash.querySelector('[data-role="boot-debug-status"]');
        var retryBtn = splash.querySelector('[data-role="boot-retry"]');
        if (retryBtn && !retryBtn.dataset.bound) {
          retryBtn.dataset.bound = '1';
          retryBtn.addEventListener('click', function () { window.location.reload(); });
        }
        var clearBtn = splash.querySelector('[data-role="boot-clear-cache"]');
        if (clearBtn && !clearBtn.dataset.bound) {
          clearBtn.dataset.bound = '1';
          clearBtn.addEventListener('click', function () {
            Promise.resolve().then(function () {
              return navigator.serviceWorker && navigator.serviceWorker.getRegistrations ? navigator.serviceWorker.getRegistrations() : [];
            }).then(function (regs) {
              return Promise.all((regs || []).map(function (reg) { return reg.unregister(); }));
            }).then(function () {
              return caches && caches.keys ? caches.keys() : [];
            }).then(function (keys) {
              return Promise.all((keys || []).map(function (key) { return caches.delete(key); }));
            }).then(function () {
              try {
                Object.keys(localStorage).forEach(function (key) {
                  if (/module|cache|preload/i.test(key)) localStorage.removeItem(key);
                });
              } catch (_) {}
              window.location.reload();
            });
          });
        }
        var copyBtn = splash.querySelector('[data-role="boot-copy-error"]');
        if (copyBtn && !copyBtn.dataset.bound) {
          copyBtn.dataset.bound = '1';
          copyBtn.addEventListener('click', function () {
            var originalLabel = copyBtn.textContent;
            Promise.resolve(copyTechnicalErrorPayload()).then(function () {
              copyBtn.textContent = 'Error copiado';
              window.setTimeout(function () { copyBtn.textContent = originalLabel; }, 1800);
            }).catch(function () {
              copyBtn.textContent = 'No se pudo copiar';
              window.setTimeout(function () { copyBtn.textContent = originalLabel; }, 1800);
            });
          });
        }
        flushPending();
        return true;
      }
      function toHumanError(value) {
        var text = String(value || '');
        if (!text) return '';
        if (/Failed to fetch dynamically imported module/i.test(text)) return 'No se pudo cargar un archivo JS. Puede estar borrado, mal referenciado o cacheado por la PWA.';
        if (/permission_denied/i.test(text)) return 'Firebase rechazó la lectura/escritura por reglas o ruta incorrecta.';
        if (/NetworkError|offline|Failed to fetch/i.test(text)) return 'No hay conexión o Firebase no responde.';
        if (/SyntaxError/i.test(text)) return 'Hay un error de sintaxis en un archivo JS.';
        if (/ReferenceError/i.test(text)) return 'El código usa una variable/función que ya no existe.';
        if (/TypeError/i.test(text)) return 'El código intenta usar algo undefined/null.';
        return 'Error de arranque no clasificado. Revisar mensaje técnico.';
      }
      function relativeTs() { return '+' + (((Date.now() - startedAt) / 1000).toFixed(1)) + 's'; }
      function renderEvent(event) {
        var base = event.icon + ' ' + event.label + ' (' + event.ts + ')';
        var details = [];
        if (event.detailsText) details.push('Detalles: ' + event.detailsText);
        if (event.file) details.push('Archivo: ' + event.file);
        if (event.line) details.push('Línea: ' + event.line + (event.column ? ':' + event.column : ''));
        if (event.moduleUrl) details.push('moduleUrl: ' + event.moduleUrl);
        if (event.lastDynamicImport) details.push('lastDynamicImport: ' + event.lastDynamicImport);
        if (event.phase) details.push('Fase: ' + event.phase);
        if (event.message) details.push('Motivo: ' + event.message);
        if (event.stack) details.push('Stack: ' + event.stack);
        if (event.human) details.push('Explicación: ' + event.human);
        return [base].concat(details).join('\n');
      }
      function appendEvent(event) {
        events.push(event);
        if (events.length > 50) events.shift();
        if (!ensure() || !debugLogEl) {
          pendingEvents.push(event);
          if (pendingEvents.length > 50) pendingEvents.shift();
          return;
        }
        var line = document.createElement('div');
        line.className = 'boot-debug-line';
        line.dataset.level = event.level;
        line.textContent = renderEvent(event);
        debugLogEl.appendChild(line);
        while (debugLogEl.children.length > 50) debugLogEl.removeChild(debugLogEl.firstChild);
        debugLogEl.scrollTop = debugLogEl.scrollHeight;
      }
      function flushPending() {
        if (!debugLogEl || !pendingEvents.length) return;
        var backlog = pendingEvents.slice();
        pendingEvents = [];
        for (var i = 0; i < backlog.length; i++) appendEvent(backlog[i]);
      }
      function stringifyDetails(details) {
        if (!details) return '';
        try { return typeof details === 'string' ? details : JSON.stringify(details); } catch (_) { return String(details); }
      }
      function extractStackLocation(stackValue) {
        var match = String(stackValue || '').match(/((?:https?:\/\/|file:\/\/\/|\/)[^)\s]+?):(\d+):(\d+)/);
        if (!match) return { filename: '', lineno: 0, colno: 0 };
        return { filename: String(match[1] || ''), lineno: Number(match[2] || 0) || 0, colno: Number(match[3] || 0) || 0 };
      }
      function setTechnicalPayload(payload) {
        lastTechnicalError = payload && typeof payload === 'object' ? payload : null;
        window.__BOOKSHELL_LAST_ERROR_DETAILS__ = lastTechnicalError;
        return lastTechnicalError;
      }
      function buildTechnicalPayload(error, details) {
        var stack = String((details && details.stack) || (error && error.stack) || '');
        var stackLocation = extractStackLocation(stack);
        var payload = {
          message: String((details && details.message) || (error && error.message) || error || ''),
          filename: String((details && (details.filename || details.file || details.source)) || (error && (error.filename || error.fileName)) || stackLocation.filename || ''),
          lineno: Number((details && (details.lineno || details.line)) || (error && (error.lineno || error.lineNumber)) || stackLocation.lineno || 0) || 0,
          colno: Number((details && (details.colno || details.column)) || (error && (error.colno || error.columnNumber)) || stackLocation.colno || 0) || 0,
          stack: stack,
          name: String((details && (details.name || details.errorName)) || (error && error.name) || ''),
          moduleUrl: String((details && details.moduleUrl) || (error && error.__bookshellModuleUrl) || ''),
          lastDynamicImport: String((details && details.lastDynamicImport) || window.__BOOKSHELL_LAST_DYNAMIC_IMPORT__ || ''),
          phase: String((details && details.phase) || (error && error.__bookshellPhase) || window.__BOOKSHELL_LAST_BOOT_PHASE__ || ''),
          userAgent: navigator.userAgent,
          locationHref: window.location.href,
          serviceWorkerController: !!(navigator.serviceWorker && navigator.serviceWorker.controller),
        };
        if (!payload.moduleUrl && payload.lastDynamicImport) payload.moduleUrl = payload.lastDynamicImport;
        return payload;
      }
      function copyTechnicalErrorPayload() {
        var payload = lastTechnicalError || window.__BOOKSHELL_LAST_ERROR_DETAILS__ || buildTechnicalPayload(null, {});
        var json = JSON.stringify(payload, null, 2);
        return navigator.clipboard && navigator.clipboard.writeText
          ? navigator.clipboard.writeText(json).then(function () { return json; })
          : Promise.resolve(json);
      }
      function record(level, label, error, details) {
        var technicalPayload = buildTechnicalPayload(error, details);
        setTechnicalPayload(technicalPayload);
        var icon = level === 'error' ? '❌' : (level === 'warn' ? '⚠️' : (level === 'ok' ? '✅' : '⏳'));
        var message = technicalPayload.message;
        var source = technicalPayload.filename;
        var lineNo = technicalPayload.lineno;
        var colNo = technicalPayload.colno;
        var detailsText = stringifyDetails(details);
        var human = toHumanError(message || String(error?.name || ''));
        var event = {
          level: level,
          icon: icon,
          label: label,
          message: message,
          file: source,
          line: lineNo,
          column: colNo,
          moduleUrl: technicalPayload.moduleUrl,
          lastDynamicImport: technicalPayload.lastDynamicImport,
          phase: technicalPayload.phase,
          stack: technicalPayload.stack,
          detailsText: detailsText,
          human: human,
          ts: relativeTs()
        };
        appendEvent(event);
        if (bootDebugStatusEl) {
          bootDebugStatusEl.textContent = 'Paso actual: ' + label + ' · Último completado: ' + (window.__bookshellLastOkStep || '—');
        }
        if (level === 'ok') window.__bookshellLastOkStep = label;
      }

      function apply() {
        if (!ensure()) return;
        if (progressEl) {
          var clamped = Math.max(0, Math.min(100, value));
          progressEl.style.transform = 'scaleX(' + (clamped / 100) + ')';
        }
        if (statusEl) {
          for (var i = phases.length - 1; i >= 0; i--) {
            if (value >= phases[i].at) { statusEl.textContent = phases[i].text; break; }
          }
        }
      }

      function tick() {
        if (done) return;
        var target = value < 60 ? 82 : 93;
        value += (target - value) * 0.12 + 0.35;
        if (value > 94) value = 94;
        apply();
        timer = window.setTimeout(tick, 140);
      }

      function setPhase(text, hintValue) {
        if (typeof hintValue === 'number') value = Math.max(value, hintValue);
        apply();
        if (ensure() && statusEl && text) statusEl.textContent = text;
      }

      function finish() {
        if (done) return;
        done = true;
        window.clearTimeout(timer);
        value = 100;
        apply();
        if (!ensure()) return;
        splash.classList.add('boot-splash-hidden');
        document.body.classList.remove('boot-loading');
        window.setTimeout(function () { splash.remove(); }, 360);
      }

      function markSlow() {
        if (!ensure()) return;
        splash.dataset.slow = '1';
      }

      window.__bookshellBootSplash = { setPhase: setPhase, done: finish, markSlow: markSlow };
      window.__bookshellSetTechnicalError = function (payload) { return setTechnicalPayload(payload || {}); };
      window.__bookshellCopyTechnicalError = copyTechnicalErrorPayload;
      window.bootDebug = {
        step: function (label, details) { console.debug('[boot:step]', label, details || ''); record('step', String(label || 'Paso'), null, details); },
        ok: function (label, details) { console.debug('[boot:ok]', label, details || ''); record('ok', String(label || 'OK'), null, details); },
        warn: function (label, details) { console.warn('[boot:warn]', label, details || ''); record('warn', String(label || 'Aviso'), null, details); },
        error: function (label, error, details) { console.error('[boot:error]', label, error, details || ''); record('error', String(label || 'Error'), error, details); },
        hide: function () { finish(); },
      };
      window.addEventListener('error', function (event) {
        window.bootDebug.error('Error global capturado', event.error || event, {
          source: event.filename,
          filename: event.filename,
          line: event.lineno,
          lineno: event.lineno,
          column: event.colno,
          colno: event.colno,
          stack: event.error && event.error.stack ? String(event.error.stack) : '',
          lastDynamicImport: window.__BOOKSHELL_LAST_DYNAMIC_IMPORT__ || '',
          moduleUrl: window.__BOOKSHELL_LAST_DYNAMIC_IMPORT__ || '',
          phase: window.__BOOKSHELL_LAST_BOOT_PHASE__ || ''
        });
      });
      window.addEventListener('unhandledrejection', function (event) {
        window.bootDebug.error('Promesa rechazada sin catch', event.reason || event, {
          reason: String(event.reason && (event.reason.message || event.reason) || ''),
          promise: String(event.promise || ''),
          stack: event.reason && event.reason.stack ? String(event.reason.stack) : '',
          lastDynamicImport: window.__BOOKSHELL_LAST_DYNAMIC_IMPORT__ || '',
          moduleUrl: event.reason && event.reason.__bookshellModuleUrl ? String(event.reason.__bookshellModuleUrl) : (window.__BOOKSHELL_LAST_DYNAMIC_IMPORT__ || ''),
          phase: event.reason && event.reason.__bookshellPhase ? String(event.reason.__bookshellPhase) : (window.__BOOKSHELL_LAST_BOOT_PHASE__ || '')
        });
      });

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          document.body.classList.add('boot-loading');
          tick();
          window.setTimeout(markSlow, 9000);
          watchdogSlowTimer = window.setTimeout(function () {
            splash.dataset.slow = '1';
            window.bootDebug.warn('La carga está tardando', { ultimoPaso: window.__bookshellLastOkStep || 'sin pasos OK' });
          }, 6000);
          watchdogFailTimer = window.setTimeout(function () {
            window.bootDebug.error('Boot bloqueado. Se intentará cargar vista segura.', null, { ultimoPaso: window.__bookshellLastOkStep || 'sin pasos OK' });
            window.dispatchEvent(new CustomEvent('bookshell:boot-watchdog-timeout'));
          }, 12000);
        }, { once: true });
      } else {
        document.body.classList.add('boot-loading');
        tick();
        window.setTimeout(markSlow, 9000);
      }
    })();
  </script>
</head>
<body>
  <div id="boot-splash" role="status" aria-live="polite" aria-label="Carga inicial de Bookshell">
    <div class="boot-splash-card">
      <div class="boot-splash-title">Bookshell</div>
      <div class="boot-splash-status" data-role="status">Inicializando…</div>
      <div class="boot-splash-progress" aria-hidden="true"><i data-role="bar"></i></div>
      <div class="boot-splash-note">La carga está tardando más de lo normal…</div>
      <div class="boot-debug-panel" aria-live="polite">
        <div class="boot-debug-title">Diagnóstico de carga</div>
        <div data-role="boot-debug-status">Paso actual: Inicializando · Último completado: —</div>
        <div data-role="boot-debug-log"></div>
        <div class="boot-debug-actions">
          <button type="button" data-role="boot-retry">Reintentar</button>
          <button type="button" data-role="boot-clear-cache">Limpiar caché y recargar</button>
          <button type="button" data-role="boot-copy-error">Copiar error técnico</button>
        </div>
      </div>
    </div>
  </div>

  <header class="app-header">
    <div class="header-title"></div>
  </header>

  <div class="app-sync-indicator-wrap" aria-live="polite">
    <button
      class="app-sync-indicator hidden"
      id="app-sync-indicator"
      type="button"
      aria-expanded="false"
      aria-label="Estado de sincronización"
    >
      <span class="sync-text"></span>
    </button>
  </div>

  <section class="view view-active" id="view-books" aria-hidden="false" data-module-view="books"></section>

  <section class="view" id="view-notes" aria-hidden="true" data-module-view="notes"></section>


  <section class="view" id="view-recipes" aria-hidden="true" data-module-view="recipes"></section>

  <section class="view" id="view-habits" aria-hidden="true" data-module-view="habits"></section>



  <section class="view" id="view-world" aria-hidden="true" data-module-view="world"></section>

  <section class="view" id="view-finance" aria-hidden="true" data-module-view="finance"></section>

    <section class="view view-gym" id="view-gym" aria-hidden="true" data-module-view="gym"></section>

  <nav class="bottom-nav" aria-label="Navegacion principal">
    <button class="nav-btn nav-btn-active" data-view="view-books" title="Libros" aria-label="Libros" aria-current="page" type="button">📖</button>
    <button class="nav-btn" data-view="view-notes" title="Notas" aria-label="Notas" type="button">🗒️</button>
    <button class="nav-btn" data-view="view-recipes" title="Recetas" aria-label="Recetas" type="button">🍳</button>
    <button class="nav-btn" data-view="view-habits" title="Habitos" aria-label="Habitos" type="button">✅</button>
    <button class="nav-btn" data-view="view-world" title="Mundo" aria-label="Mundo" type="button">🌍</button>
    <button class="nav-btn" data-view="view-finance" title="Cuentas" aria-label="Cuentas" type="button">💲</button>
        <button class="nav-btn" data-view="view-gym" title="Gym" aria-label="Gym" type="button">💪</button>
  </nav>

  <datalist id="country-options"></datalist>

  <script type="module" src="./scripts/app/main.js"></script>
</body>
</html>
