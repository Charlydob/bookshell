<div class="home-shell">
  <section class="home-hero home-card">
    <div class="home-hero-top">
      <div class="home-hero-copy">
        <p class="home-eyebrow">Home diario</p>
        <h1 class="home-title">Entra por lo importante</h1>
        <p class="home-subtitle" id="home-date-label">Hoy</p>
      </div>
      <div class="home-sync-pill" id="home-sync-pill" data-state="synced">Sincronizado</div>
    </div>

    <div class="home-hero-actions">
      <button class="btn primary" type="button" data-home-open-view="view-habits" data-home-reset="1">
        Abrir hoy
      </button>
      <button class="btn ghost" type="button" data-home-open-continue>
        Continuar
      </button>
    </div>
  </section>

  <section class="home-section">
    <div class="home-section-head">
      <div>
        <p class="home-section-kicker">Prioridad</p>
        <h2>Hoy</h2>
      </div>
    </div>

    <div class="home-priority-grid">
      <button class="home-priority-card home-card" type="button" data-home-open-view="view-habits" data-home-reset="1">
        <span class="home-card-kicker">Habitos</span>
        <strong>Panel de hoy</strong>
        <span>Entrar directo a pendientes, contadores y sesiones.</span>
      </button>

      <button class="home-priority-card home-card" type="button" data-home-run-quick="books">
        <span class="home-card-kicker">Lectura</span>
        <strong>Iniciar sesion</strong>
        <span>Reutiliza el acceso rapido de libros sin pasar por toda la vista.</span>
      </button>

      <button class="home-priority-card home-card" type="button" data-home-run-quick="recipes">
        <span class="home-card-kicker">Registro</span>
        <strong>Anadir comida</strong>
        <span>Ir a la accion rapida de recetas para registrar algo ahora.</span>
      </button>
    </div>
  </section>

  <section class="home-section">
    <div class="home-section-head">
      <div>
        <p class="home-section-kicker">Retomar</p>
        <h2>Continuar</h2>
      </div>
    </div>

    <div class="home-list" id="home-continue-list"></div>
  </section>

  <section class="home-section">
    <div class="home-section-head">
      <div>
        <p class="home-section-kicker">Contexto</p>
        <h2>Recientes</h2>
      </div>
    </div>

    <div class="home-list" id="home-recent-list"></div>
  </section>

  <section class="home-section">
    <div class="home-section-head home-section-head-actions">
      <div>
        <p class="home-section-kicker">Accion</p>
        <h2>Quick actions</h2>
      </div>
      <button class="btn ghost btn-compact" type="button" data-home-open-fab>
        Ver FAB
      </button>
    </div>

    <div class="home-quick-grid" id="home-quick-actions"></div>
  </section>
</div>
