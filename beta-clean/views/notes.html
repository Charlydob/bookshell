<div class="notes-view" id="notes-view-root">
  <section class="notes-screen" id="notes-folders-screen">
    <header class="notes-header-row">
      <h2 class="notes-title">Notas</h2>
      <button class="btn primary notes-create-folder" id="notes-btn-new-folder" type="button">Nueva carpeta</button>
    </header>

    <div class="notes-search-wrap">
      <input class="filter-search-input" id="notes-search-folders" type="search" placeholder="Buscar carpetas..." autocomplete="off" />
    </div>

    <div class="notes-filters-row">
      <select class="notes-filter-select" id="notes-filter-category">
        <option value="">Categoría: Todas</option>
      </select>
      <select class="notes-filter-select" id="notes-filter-tags">
        <option value="">Tags: Todos</option>
      </select>
    </div>

    <div class="notes-folder-list" id="notes-folder-list"></div>
  </section>

  <section class="notes-screen hidden" id="notes-folder-screen">
    <header class="notes-folder-head">
      <button class="icon-btn icon-btn-large" id="notes-btn-back" type="button">←</button>
      <div class="notes-folder-head-copy">
        <h2 id="notes-folder-name">Carpeta</h2>
        <p id="notes-folder-count">0 notas</p>
      </div>
    </header>

    <div class="notes-folder-breadcrumbs" id="notes-folder-breadcrumbs"></div>

    <div class="notes-folder-actions-top">
      <button class="btn primary" id="notes-btn-new-note" type="button">Nueva nota</button>
      <button class="btn ghost" id="notes-btn-new-subfolder" type="button">Nueva subcarpeta</button>
    </div>

    <section class="notes-subfolder-block hidden" id="notes-subfolder-block">
      <div class="notes-section-label">Subcarpetas</div>
      <div class="notes-folder-list notes-folder-list-nested" id="notes-subfolder-list"></div>
    </section>

    <div class="notes-search-wrap">
      <input class="filter-search-input" id="notes-search-notes" type="search" placeholder="Buscar notas..." autocomplete="off" />
    </div>

    <div class="notes-filters-row">
      <select class="notes-filter-select" id="notes-filter-note-category">
        <option value="">Categoría: Todas</option>
      </select>
      <select class="notes-filter-select" id="notes-filter-note-tags">
        <option value="">Tags: Todos</option>
      </select>
    </div>

    <div class="notes-section-label hidden" id="notes-notes-section-label">Notas</div>
    <div class="notes-cards-list" id="notes-cards-list"></div>
    <div class="empty-state hidden" id="notes-empty-folder">Esta carpeta está vacía.</div>
  </section>
</div>

<div class="modal-backdrop hidden" id="notes-folder-modal-backdrop">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="notes-folder-modal-title">Nueva carpeta</div>
      <button class="icon-btn" id="notes-folder-modal-close" type="button">✕</button>
    </div>
    <form class="modal-form" id="notes-folder-form">
      <input type="hidden" id="notes-folder-id" />
      <div class="modal-scroll">
        <div id="meta-notas-folder">
          <label class="field">
            <span class="field-label">Nombre</span>
            <input id="notes-folder-name-input" type="text" required />
          </label>

          <label class="field">
            <span class="field-label">Emoji</span>
            <input id="notes-folder-emoji" type="text" maxlength="2" placeholder="📁" value="📁" />
          </label>

          <label class="field">
            <span class="field-label">Carpeta padre</span>
            <select id="notes-folder-parent-select" class="field-select">
              <option value="">Raíz</option>
            </select>
          </label>

          <label class="field">
            <span class="field-label">Color</span>
            <input id="notes-folder-color" type="color" value="#00d4ff" />
          </label>

          <label class="field">
            <span class="field-label">Categoría</span>
            <select id="notes-folder-category-select" class="field-select">
              <option value="">-- Seleccionar o escribir --</option>
            </select>
            <input id="notes-folder-category" type="text" placeholder="Ej: Personal, Trabajo..." />
          </label>

          <label class="field">
            <span class="field-label">Tags</span>
            <select id="notes-folder-tags-select" class="field-select">
              <option value="">-- Seleccionar o escribir --</option>
            </select>
            <input id="notes-folder-tags" type="text" placeholder="Ej: importante, proyecto, 2024" />
          </label>
        </div>

        <div id="meta-notas-folder-2">
          <label class="toggle-pill notes-toggle-field">
            <input id="notes-folder-private" type="checkbox" />
            <span>¿Privada?</span>
          </label>

          <label class="field hidden" id="notes-folder-pin-wrap">
            <span class="field-label">PIN (4 dígitos)</span>
            <input id="notes-folder-pin" type="password" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" />
          </label>
        </div>

        <p class="notes-form-error" id="notes-folder-form-error"></p>
      </div>

      <div class="notes-modal-actions">
        <button class="btn primary" type="submit">Guardar</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-backdrop hidden" id="notes-note-modal-backdrop">
  <div class="modal" id="editar-nota-modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="notes-note-modal-title">Nueva nota</div>
      <button class="icon-btn" id="notes-note-modal-close" type="button">✕</button>
    </div>
    <form class="modal-form" id="notes-note-form">
      <input type="hidden" id="notes-note-id" />
      <input type="hidden" id="notes-note-folder-id" />
      <div class="modal-scroll">
        <label class="field hidden" id="notes-note-folder-wrap">
          <span class="field-label">Carpeta</span>
          <select id="notes-note-folder-select" class="field-select">
            <option value="">Selecciona una carpeta</option>
          </select>
        </label>

        <label class="field">
          <input id="notes-note-title" type="text" required />
        </label>

        <label class="field">
          <textarea id="notes-note-content" rows="5"></textarea>
        </label>
        <label class="toggle-pill notes-toggle-field">
          <input id="notes-note-is-link" type="checkbox" />
          <span>Es link</span>
        </label>

        <label class="field hidden" id="notes-note-url-wrap">
          <span class="field-label">URL</span>
          <input id="notes-note-url" type="url" placeholder="https://..." />
        </label>

        <div class="field notes-photo-field">
          <div class="notes-photo-wrap">
            <div class="notes-photo-preview-wrap">
              <img id="notes-note-image-preview" class="notes-photo-preview hidden" alt="Foto de la nota" />
              <div class="notes-photo-placeholder" id="notes-note-image-placeholder">🖼️</div>
            </div>
            <div class="notes-photo-actions">
              <button class="btn ghost btn-compact" id="notes-note-image-camera" type="button">📷 Cámara</button>
              <button class="btn ghost btn-compact" id="notes-note-image-gallery" type="button">🖼️ Galería</button>
              <button class="btn ghost danger btn-compact" id="notes-note-image-remove" type="button">Quitar</button>
            </div>
            <div class="notes-photo-status" id="notes-note-image-status"></div>
            <input id="notes-note-image-file" type="file" accept="image/*" hidden />
          </div>
        </div>

        <div id="meta-notas-note">
          <label class="field">
            <span class="field-label">Categoría</span>
            <select id="notes-note-category-select" class="field-select">
              <option value="">-- Seleccionar o escribir --</option>
            </select>
            <input id="notes-note-category" type="text" placeholder="Ej: Personal, Trabajo..." />
          </label>

          <label class="field">
            <span class="field-label">Tags</span>
            <select id="notes-note-tags-select" class="field-select">
              <option value="">-- Seleccionar o escribir --</option>
            </select>
            <input id="notes-note-tags" type="text" placeholder="Ej: importante, proyecto, 2024" />
          </label>
        </div>

        <div class="notes-tag-media-panel" id="notes-note-tag-images">
          <div class="notes-tag-media-header">
            <span class="field-label">Imagenes de tags</span>
            <span class="notes-tag-media-hint">La mini preview usa el primer tag con imagen y se comparte por nombre.</span>
          </div>
          <div class="notes-tag-media-empty" id="notes-note-tag-images-empty">Anade tags para asociarles una imagen opcional.</div>
          <div class="notes-tag-media-list" id="notes-note-tag-images-list"></div>
          <input id="notes-note-tag-image-file" type="file" accept="image/*" hidden />
        </div>


        <p class="notes-form-error" id="notes-note-form-error"></p>
      </div>
      <div class="notes-modal-actions">
        <button class="btn primary" type="submit">Guardar</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-backdrop hidden" id="notes-pin-modal-backdrop">
  <div class="modal notes-pin-modal">
    <div class="modal-header">
      <div class="modal-title">Carpeta privada</div>
      <button class="icon-btn" id="notes-pin-modal-close" type="button">✕</button>
    </div>
    <form class="modal-form" id="notes-pin-form">
      <input type="hidden" id="notes-pin-folder-id" />
      <div class="modal-body">
        <label class="field">
          <span class="field-label">Introduce el PIN</span>
          <input id="notes-pin-input" type="password" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" required />
        </label>
        <p class="notes-form-error" id="notes-pin-error"></p>
      </div>
      <div class="notes-modal-actions">
        <button class="btn primary" type="submit">Entrar</button>
      </div>
    </form>
  </div>
</div>
