<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <title>Bookshell Launcher</title>
  <meta name="theme-color" content="#05060a" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #05060a;
      --panel: rgba(12, 20, 44, 0.88);
      --stroke: rgba(160, 220, 255, 0.18);
      --text: #f4f7ff;
      --muted: #a8b6d6;
      --accent: #7f5dff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(1000px 520px at 50% -10%, rgba(89, 163, 255, 0.16), transparent 68%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding:
        max(env(safe-area-inset-top), 24px)
        18px
        max(env(safe-area-inset-bottom), 24px);
    }

    .launcher {
      width: min(440px, 100%);
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--stroke);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
    }

    .launcher h1 {
      margin: 0;
      font-size: 1.25rem;
    }

    .launcher p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .launcher-actions {
      display: grid;
      gap: 10px;
    }

    .launcher-link {
      display: block;
      text-decoration: none;
      text-align: center;
      padding: 14px 16px;
      border-radius: 14px;
      color: var(--text);
      border: 1px solid var(--stroke);
      background: rgba(255, 255, 255, 0.06);
      font-weight: 600;
    }

    .launcher-link--primary {
      background: radial-gradient(circle at top left, #b39cff, var(--accent));
      border-color: rgba(179, 156, 255, 0.6);
      box-shadow: 0 10px 28px rgba(127, 93, 255, 0.35);
    }

    .launcher-note {
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="launcher">
    <h1>Bookshell</h1>
    <p>Selector simple para abrir cada versión desde su propia carpeta y ver claramente qué pertenece a cada una.</p>

    <div class="launcher-actions">
      <a class="launcher-link launcher-link--primary" href="./beta/index.html">Abrir beta</a>
      <a class="launcher-link" href="./beta-clean/index.html">Abrir beta-clean</a>
    </div>

    <p class="launcher-note">La beta original vive ahora en <code>/beta</code> y <code>beta-clean</code> mantiene sus assets locales.</p>
  </main>
</body>
</html>
